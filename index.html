<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator">
        <div class="tabs">
            <button class="tab active" data-target="calc">Calculator</button>
            <button class="tab" data-target="currency">Currency</button>
        </div>

        <div class="display-container">
            <div class="display" id="calc-display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>

            <div class="currency-display" id="currency-display" style="display: none;">
                <div class="currency-row">
                    <select id="currency-from" class="currency-select"></select>
                    <div class="currency-value" id="currency-from-value">0</div>
                </div>
                <div class="currency-row">
                    <select id="currency-to" class="currency-select"></select>
                    <div class="currency-value" id="currency-to-value">0</div>
                </div>
                <div class="exchange-rate-info" id="exchange-rate-info">Loading rates...</div>
            </div>
        </div>

        <div class="keypad">
            <button class="btn memory" id="clear">AC</button>
            <button class="btn memory" id="delete">⌫</button>
            <button class="btn memory action" data-action="percent">%</button>
            <button class="btn operator" data-operator="÷">÷</button>
            
            <button class="btn number" data-number="7">7</button>
            <button class="btn number" data-number="8">8</button>
            <button class="btn number" data-number="9">9</button>
            <button class="btn operator" data-operator="×">×</button>
            
            <button class="btn number" data-number="4">4</button>
            <button class="btn number" data-number="5">5</button>
            <button class="btn number" data-number="6">6</button>
            <button class="btn operator" data-operator="-">-</button>
            
            <button class="btn number" data-number="1">1</button>
            <button class="btn number" data-number="2">2</button>
            <button class="btn number" data-number="3">3</button>
            <button class="btn operator" data-operator="+">+</button>
            
            <button class="btn number zero" data-number="0">0</button>
            <button class="btn number" data-number=".">.</button>
            <button class="btn equals" id="equals">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
